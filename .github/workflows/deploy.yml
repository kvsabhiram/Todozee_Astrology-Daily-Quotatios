name: Build & Deploy (GPU / EC2)

# CI/CD: build the GPU image (build job), then deploy onto the g6.xlarge EC2 box
# via SSM (deploy job). Split into two jobs so deploy only runs if build succeeds.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

env:
  AWS_REGION: ap-south-1
  ECR_REPO: todozee-astrology
  CONTAINER_NAME: astrology
  APP_PORT: 7005

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for AWS OIDC
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPO" \
                 --image-scanning-configuration scanOnPush=true

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO"
          # HF_TOKEN is only needed if the Gemma model is gated; empty is fine otherwise.
          docker build \
            --build-arg HF_TOKEN="${HF_TOKEN}" \
            -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image_uri=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for AWS OIDC
    env:
      IMAGE_URI: ${{ needs.build.outputs.image_uri }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          REGISTRY="${IMAGE_URI%%/*}"
          cat > deploy-cmd.json <<EOF
          {
            "commands": [
              "set -e",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${REGISTRY}",
              "docker pull ${IMAGE_URI}",
              "docker rm -f ${CONTAINER_NAME} 2>/dev/null || true",
              "docker run -d --name ${CONTAINER_NAME} --restart unless-stopped --gpus all -p ${APP_PORT}:${APP_PORT} ${IMAGE_URI}",
              "docker image prune -af"
            ]
          }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy astrology ${{ github.sha }}" \
            --parameters file://deploy-cmd.json \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          # Poll to a terminal state ourselves: the built-in waiter caps near ~100s, but
          # pulling the multi-GB image takes longer, and `|| true` would mask a still-running
          # or failed command -> the job would go green before the container was swapped.
          STATUS=Pending
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Out:StandardOutputContent,Err:StandardErrorContent}" --output json
          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deploy SSM command did not succeed (status=$STATUS)"; exit 1
          fi

      - name: Health check
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat > health-cmd.json <<EOF
          {
            "commands": [
              "for i in \$(seq 1 40); do curl -fsS http://localhost:${APP_PORT}/status && exit 0; sleep 10; done; echo UNHEALTHY; exit 1"
            ]
          }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file://health-cmd.json \
            --query "Command.CommandId" --output text)
          # The on-box script exits 0 only once /status returns OK (model loaded), else 1.
          STATUS=Pending
          for i in $(seq 1 50); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Out:StandardOutputContent}" --output json
          if [ "$STATUS" != "Success" ]; then
            echo "::error::Health check failed - deployed container did not become healthy (status=$STATUS)"; exit 1
          fi
